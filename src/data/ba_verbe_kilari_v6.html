:root {
  --bg:#0d1117;--surf:#161b22;--surf2:#1e2530;--bord:#2a3344;
  --gold:#c8902a;--gold2:#e8b84b;--text:#e6ddd0;--muted:#7a7265;
  --cc:#c8902a;--cf:#3a9e55;--cp:#4a82b0;
  --serif:'Palatino Linotype',Palatino,'Book Antiqua',Georgia,serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--serif);background:var(--bg);color:var(--text);min-height:100vh;padding:2rem 1rem 4rem}

/* HEADER */
.hd{text-align:center;margin-bottom:2rem}
.site{font-family:'Mandombe',serif;font-size:2.2rem;color:var(--gold2);display:block;line-height:1.8;margin-bottom:1.4rem}
.hd h1{font-size:1.15rem;font-weight:400;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-bottom:.35rem;margin-top:.2rem}
.hd p{font-size:.8rem;color:var(--muted);font-style:italic}

/* LEGEND */
.leg{display:flex;gap:1.3rem;justify-content:center;margin-bottom:1.5rem;flex-wrap:wrap;font-size:.77rem;color:var(--muted)}
.li{display:flex;align-items:center;gap:.38rem}
.dot{width:8px;height:8px;border-radius:50%}

/* TABLE */
.tw{max-width:920px;margin:0 auto;overflow-x:auto}
table{width:100%;border-collapse:separate;border-spacing:0;border:1px solid var(--bord);border-radius:8px;overflow:hidden}
thead th{background:var(--surf2);padding:.8rem .9rem;font-size:.69rem;font-weight:700;letter-spacing:.13em;text-transform:uppercase;border-bottom:2px solid var(--bord);text-align:left}
thead th:first-child{width:22%;color:var(--muted)}
thead th.hcc{width:26%;color:var(--cc);border-bottom-color:var(--cc);text-align:center}
thead th.hcf{width:26%;color:var(--cf);border-bottom-color:var(--cf);text-align:center}
thead th.hcp{width:26%;color:var(--cp);border-bottom-color:var(--cp);text-align:center}
tbody tr{background:var(--surf);border-bottom:1px solid var(--bord);transition:background .12s}
tbody tr:hover{background:var(--surf2)}
tbody tr:last-child{border-bottom:none}
td{padding:.7rem .9rem;vertical-align:middle}
td.ts{border-right:1px solid var(--bord)}

/* Substantif column: Mandombe on its own line, plenty of space, no overlap */
.s-mando {
  font-family:'Mandombe',serif;
  font-size:1.15rem;
  color:var(--gold2);
  display:block;
  line-height:2;        /* generous line-height so glyphs don't touch */
  margin-bottom:.4rem;  /* clear gap before the French translation */
}
.s-fr {
  font-size:.72rem;
  color:var(--muted);
  font-style:italic;
  display:block;
  line-height:1.4;
}

/* VERB CELLS: single glyph element, solid color, generous padding */
.cv{text-align:center;cursor:pointer}
.vbtn{
  display:inline-block;
  padding:.5rem .8rem;
  border-radius:6px;
  border:1px solid transparent;
  transition:all .14s;
  line-height:1;
}
.cv:hover .vbtn{border-color:var(--bord);background:rgba(255,255,255,.04);transform:scale(1.07)}
.glyph{
  font-family:'Mandombe',serif;
  font-size:1.9rem;     /* bigger so glyphs are readable */
  line-height:1.8;      /* enough vertical space so descenders/ascenders don't clash */
  display:block;
  text-shadow:none;
  -webkit-text-stroke:0;
  position:static;
}
.hcc .glyph{color:var(--cc)}
.hcf .glyph{color:var(--cf)}
.hcp .glyph{color:var(--cp)}

/* MODAL */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:300;align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(4px)}
.ov.open{display:flex}
.mo{background:var(--surf);border:1px solid var(--bord);border-radius:12px;max-width:500px;width:100%;overflow:hidden;animation:fi .16s ease;box-shadow:0 32px 80px rgba(0,0,0,.75)}
@keyframes fi{from{opacity:0;transform:translateY(12px) scale(.97)}to{opacity:1;transform:none}}

.mo-top{padding:1.2rem 1.4rem 1rem;border-bottom:1px solid var(--bord);display:flex;justify-content:space-between;align-items:flex-start;gap:1rem}
.mo-verb{display:flex;flex-direction:column;gap:.5rem}  /* gap between glyph and latin */

/* Modal glyph: large, on its own line, plenty of room */
.mo-glyph{
  font-family:'Mandombe',serif;
  font-size:3.2rem;
  line-height:1.6;
  display:block;
  text-shadow:none;
  -webkit-text-stroke:0;
  position:static;
  margin-bottom:1rem;
}
/* Latin label: plain serif, completely separate block below the glyph */
.mo-latin{
  font-family:var(--serif);
  font-size:1rem;
  font-weight:700;
  letter-spacing:.06em;
  display:block;
  line-height:1.4;
  margin-top:.2rem;     /* extra margin so it can't overlap with glyph */
}
.mo-badge{display:inline-block;font-size:.65rem;padding:.18rem .55rem;border-radius:20px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;width:fit-content;margin-top:1.2rem}
.bc{background:rgba(200,144,42,.18);color:var(--cc);border:1px solid rgba(200,144,42,.35)}
.bf{background:rgba(58,158,85,.18);color:var(--cf);border:1px solid rgba(58,158,85,.35)}
.bp{background:rgba(74,130,176,.18);color:var(--cp);border:1px solid rgba(74,130,176,.35)}

.mo-close{background:none;border:1px solid var(--bord);color:var(--muted);width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:.95rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .13s}
.mo-close:hover{background:var(--surf2);color:var(--text)}

.mo-body{padding:1.1rem 1.4rem 1.4rem}
.mo-row{margin-bottom:1rem}
.mo-row:last-child{margin-bottom:0}
.mo-label{font-size:.65rem;text-transform:uppercase;letter-spacing:.14em;color:var(--muted);margin-bottom:.25rem;font-weight:700}
.mo-val{font-size:.95rem;color:var(--text);line-height:1.5}

/* KIFUANI block: 3 completely separate lines, generous spacing */
.kif{
  background:var(--surf2);
  border-left:3px solid var(--gold);
  border-radius:0 6px 6px 0;
  padding:.9rem 1rem;
  display:flex;
  flex-direction:column;
  gap:.6rem;            /* clear gap between each of the 3 lines */
}
/* Line 1: Mandombe sentence */
.kif-mando{
  font-family:'Mandombe',serif;
  font-size:1.15rem;
  color:var(--gold2);
  line-height:2;        /* tall line-height prevents glyph overlap */
  display:block;
  text-shadow:none;
  -webkit-text-stroke:0;
  position:static;
}
/* Line 2: Latin transcription */
.kif-latin{
  font-family:var(--serif);
  font-size:.9rem;
  font-style:italic;
  color:var(--gold2);
  opacity:.8;
  line-height:1.5;
  display:block;
  position:static;
}
/* Line 3: French translation */
.kif-fr{
  font-family:var(--serif);
  font-size:.84rem;
  color:var(--muted);
  line-height:1.5;
  display:block;
  position:static;
}

@media(max-width:580px){
  td{padding:.5rem .55rem}
  .glyph{font-size:1.4rem}
  thead th{font-size:.63rem;padding:.6rem .5rem}
}
</style>
</head>
<body>

<header class="hd">
  <span class="site">NZO MIKANDA</span>
  <h1>BA= · Le verbe <em>être</em> en Kilari</h1>
  <p>Cliquez sur une forme verbale pour voir la traduction et le kifuani</p>
</header>

<div class="leg">
  <div class="li"><div class="dot" style="background:var(--cc)"></div>Présent contracté</div>
  <div class="li"><div class="dot" style="background:var(--cf)"></div>Présent plein</div>
  <div class="li"><div class="dot" style="background:var(--cp)"></div>Passé</div>
</div>

<div class="tw">
  <table>
    <thead>
      <tr>
        <th>Pronom / Substantif</th>
        <th class="hcc">Présent contracté</th>
        <th class="hcf">Présent plein</th>
        <th class="hcp">Passé</th>
      </tr>
    </thead>
    <tbody id="tb"></tbody>
  </table>
</div>

<!-- MODAL -->
<div class="ov" id="ov">
  <div class="mo">
    <div class="mo-top">
      <div class="mo-verb">
        <span class="mo-glyph" id="mg"></span>
        <span class="mo-badge" id="mb"></span>
      </div>
      <button class="mo-close" id="mx">×</button>
    </div>
    <div class="mo-body">
      <div class="mo-row">
        <div class="mo-label">Pronom / Substantif</div>
        <div class="mo-val" id="mcl"></div>
      </div>
      <div class="mo-row">
        <div class="mo-label">Forme latine</div>
        <div class="mo-val" id="ml" style="font-weight:700;letter-spacing:.06em;"></div>
      </div>
      <div class="mo-row">
        <div class="mo-label">Traduction</div>
        <div class="mo-val" id="mtr"></div>
      </div>
      <div class="mo-row">
        <div class="mo-label">Kifuani</div>
        <div class="kif">
          <span class="kif-mando" id="km"></span>
          <span class="kif-latin" id="kl"></span>
          <span class="kif-fr"    id="kf"></span>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
var DATA = [{"classe": "yandi", "classe_fr": "il / elle", "c": "we", "f": "wena", "p": "weri", "c_tr": "il est / elle est (contracté)", "f_tr": "il est / elle est", "p_tr": "il était / elle était", "c_kil": "Yandi wa toma we.", "c_lat": "Yandi wa toma we.", "c_fr": "Il est beau.", "f_kil": "Yandi wa toma wena.", "f_lat": "Yandi wa toma wena.", "f_fr": "Il est beau.", "p_kil": "Yandi wa toma weri.", "p_lat": "Yandi wa toma weri.", "p_fr": "Il était beau."}, {"classe": "yandi", "classe_fr": "il / elle (locatif)", "c": "ke", "f": "kena", "p": "keri", "c_tr": "il est / elle est (contracté, locatif)", "f_tr": "il est / elle est (locatif)", "p_tr": "il était / elle était (locatif)", "c_kil": "Yandi ha zandu ke.", "c_lat": "Yandi ha zandu ke.", "c_fr": "Lui, il est au marché.", "f_kil": "Yandi ha zandu kena.", "f_lat": "Yandi ha zandu kena.", "f_fr": "Lui, il est au marché.", "p_kil": "Yandi ha zandu keri.", "p_lat": "Yandi ha zandu keri.", "p_fr": "Lui, il était au marché."}, {"classe": "bantu", "classe_fr": "les humains / les personnes", "c": "be", "f": "bena", "p": "beri", "c_tr": "ils / elles sont (contracté)", "f_tr": "ils / elles sont", "p_tr": "ils / elles étaient", "c_kil": "Bantu ba toma be.", "c_lat": "Bantu ba toma be.", "c_fr": "Les humains sont beaux.", "f_kil": "Bantu ba toma bena.", "f_lat": "Bantu ba toma bena.", "f_fr": "Les humains sont beaux.", "p_kil": "Bantu ba toma beri.", "p_lat": "Bantu ba toma beri.", "p_fr": "Les humains étaient beaux."}, {"classe": "lumbembemba", "classe_fr": "papillon", "c": "lue", "f": "luena", "p": "lueri", "c_tr": "il est (contracté)", "f_tr": "il est", "p_tr": "il était", "c_kil": "Lumbembemba lua toma lue.", "c_lat": "Lumbembemba lua toma lue.", "c_fr": "Le papillon est beau.", "f_kil": "Lumbembemba lua toma luena.", "f_lat": "Lumbembemba lua toma luena.", "f_fr": "Le papillon est beau.", "p_kil": "Lumbembemba lua toma lueri.", "p_lat": "Lumbembemba lua toma lueri.", "p_fr": "Le papillon était beau."}, {"classe": "tumbembemba", "classe_fr": "papillons", "c": "tue", "f": "tuena", "p": "tueri", "c_tr": "ils sont (contracté)", "f_tr": "ils sont", "p_tr": "ils étaient", "c_kil": "Tumbembemba tua toma tue.", "c_lat": "Tumbembemba tua toma tue.", "c_fr": "Les papillons sont beaux.", "f_kil": "Tumbembemba tua toma tuena.", "f_lat": "Tumbembemba tua toma tuena.", "f_fr": "Les papillons sont beaux.", "p_kil": "Tumbembemba tua toma tueri.", "p_lat": "Tumbembemba tua toma tueri.", "p_fr": "Les papillons étaient beaux."}, {"classe": "mapapa", "classe_fr": "chaussures", "c": "me", "f": "mena", "p": "meri", "c_tr": "elles sont (contracté)", "f_tr": "elles sont", "p_tr": "elles étaient", "c_kil": "Mapapa ma toma me.", "c_lat": "Mapapa ma toma me.", "c_fr": "Les chaussures sont belles.", "f_kil": "Mapapa ma toma mena.", "f_lat": "Mapapa ma toma mena.", "f_fr": "Les chaussures sont belles.", "p_kil": "Mapapa ma toma meri.", "p_lat": "Mapapa ma toma meri.", "p_fr": "Les chaussures étaient belles."}, {"classe": "buishi", "classe_fr": "le jour", "c": "bue", "f": "buena", "p": "bueri", "c_tr": "il est (contracté)", "f_tr": "il est", "p_tr": "il était", "c_kil": "Buishi bua toma bue.", "c_lat": "Buishi bua toma bue.", "c_fr": "Le jour est beau. Il fait beau.", "f_kil": "Buishi bua toma buena.", "f_lat": "Buishi bua toma buena.", "f_fr": "Le jour est beau. Il fait beau.", "p_kil": "Buishi bua toma bueri.", "p_lat": "Buishi bua toma bueri.", "p_fr": "Le jour était beau. Il faisait beau."}, {"classe": "binzu", "classe_fr": "les marmites", "c": "bie", "f": "biena", "p": "bieri", "c_tr": "elles sont (contracté)", "f_tr": "elles sont", "p_tr": "elles étaient", "c_kil": "Binzu bia toma bie.", "c_lat": "Binzu bia toma bie.", "c_fr": "Les marmites sont belles.", "f_kil": "Binzu bia toma biena.", "f_lat": "Binzu bia toma biena.", "f_fr": "Les marmites sont belles.", "p_kil": "Binzu bia toma bieri.", "p_lat": "Binzu bia toma bieri.", "p_fr": "Les marmites étaient belles."}, {"classe": "papa", "classe_fr": "chaussure", "c": "die", "f": "diena", "p": "dieri", "c_tr": "elle est (contracté)", "f_tr": "elle est", "p_tr": "elle était", "c_kil": "Papa dia toma die.", "c_lat": "Papa dia toma die.", "c_fr": "La chaussure est belle.", "f_kil": "Papa dia toma diena.", "f_lat": "Papa dia toma diena.", "f_fr": "La chaussure est belle.", "p_kil": "Papa dia toma dieri.", "p_lat": "Papa dia toma dieri.", "p_fr": "La chaussure était belle."}, {"classe": "kinzu", "classe_fr": "marmite", "c": "kie", "f": "kiena", "p": "kieri", "c_tr": "elle est (contracté)", "f_tr": "elle est", "p_tr": "elle était", "c_kil": "Kinzu kia toma kie.", "c_lat": "Kinzu kia toma kie.", "c_fr": "La marmite est belle.", "f_kil": "Kinzu kia toma kiena.", "f_lat": "Kinzu kia toma kiena.", "f_fr": "La marmite est belle.", "p_kil": "Kinzu kia toma kieri.", "p_lat": "Kinzu kia toma kieri.", "p_fr": "La marmite était belle."}, {"classe": "mbua", "classe_fr": "chien", "c": "ye", "f": "yena", "p": "yeri", "c_tr": "il est (contracté)", "f_tr": "il est", "p_tr": "il était", "c_kil": "Mbua ya toma ye.", "c_lat": "Mbua ya toma ye.", "c_fr": "Le chien est beau.", "f_kil": "Mbua ya toma yena.", "f_lat": "Mbua ya toma yena.", "f_fr": "Le chien est beau.", "p_kil": "Mbua ya toma yeri.", "p_lat": "Mbua ya toma yeri.", "p_fr": "Le chien était beau."}, {"classe": "mbua", "classe_fr": "chiens", "c": "ze", "f": "zena", "p": "zeri", "c_tr": "ils sont (contracté)", "f_tr": "ils sont", "p_tr": "ils étaient", "c_kil": "Mbua za toma ze.", "c_lat": "Mbua za toma ze.", "c_fr": "Les chiens sont beaux.", "f_kil": "Mbua za toma zena.", "f_lat": "Mbua za toma zena.", "f_fr": "Les chiens sont beaux.", "p_kil": "Mbua za toma zeri.", "p_lat": "Mbua za toma zeri.", "p_fr": "Les chiens étaient beaux."}, {"classe": "milumba", "classe_fr": "lapins", "c": "mie", "f": "miena", "p": "mieri", "c_tr": "ils sont (contracté)", "f_tr": "ils sont", "p_tr": "ils étaient", "c_kil": "Milumba mia toma mie.", "c_lat": "Milumba mia toma mie.", "c_fr": "Les lapins sont beaux.", "f_kil": "Milumba mia toma miena.", "f_lat": "Milumba mia toma miena.", "f_fr": "Les lapins sont beaux.", "p_kil": "Milumba mia toma mieri.", "p_lat": "Milumba mia toma mieri.", "p_fr": "Les lapins étaient beaux."}, {"classe": "kulu", "classe_fr": "pied", "c": "kue", "f": "kuena", "p": "kueri", "c_tr": "il est (contracté)", "f_tr": "il est", "p_tr": "il était", "c_kil": "Kulu kua toma kue.", "c_lat": "Kulu kua toma kue.", "c_fr": "Le pied est beau.", "f_kil": "Kulu kua toma kuena.", "f_lat": "Kulu kua toma kuena.", "f_fr": "Le pied est beau.", "p_kil": "Kulu kua toma kueri.", "p_lat": "Kulu kua toma kueri.", "p_fr": "Le pied était beau."}, {"classe": "huma", "classe_fr": "endroit", "c": "he", "f": "hena", "p": "heri", "c_tr": "il est (contracté)", "f_tr": "il est", "p_tr": "il était", "c_kil": "Huma ha toma he.", "c_lat": "Huma ha toma he.", "c_fr": "L'endroit est beau.", "f_kil": "Huma ha toma hena.", "f_lat": "Huma ha toma hena.", "f_fr": "L'endroit est beau.", "p_kil": "Huma ha toma heri.", "p_lat": "Huma ha toma heri.", "p_fr": "L'endroit était beau."}];

var TMAP = {
  c:{label:'Présent contracté',badge:'bc',col:'var(--cc)',vk:'c',trk:'c_tr',kilk:'c_kil',latk:'c_lat',frk:'c_fr'},
  f:{label:'Présent plein',    badge:'bf',col:'var(--cf)',vk:'f',trk:'f_tr',kilk:'f_kil',latk:'f_lat',frk:'f_fr'},
  p:{label:'Passé',            badge:'bp',col:'var(--cp)',vk:'p',trk:'p_tr',kilk:'p_kil',latk:'p_lat',frk:'p_fr'}
};

var tb = document.getElementById('tb');
DATA.forEach(function(row, i) {
  var tr = document.createElement('tr');
  tr.innerHTML =
    '<td class="ts">' +
      '<span class="s-mando">' + row.classe + '</span>' +
      '<span class="s-fr">' + row.classe_fr + '</span>' +
    '</td>' +
    '<td class="hcc cv" data-i="' + i + '" data-t="c" tabindex="0"><div class="vbtn"><span class="glyph">' + row.c + '</span></div></td>' +
    '<td class="hcf cv" data-i="' + i + '" data-t="f" tabindex="0"><div class="vbtn"><span class="glyph">' + row.f + '</span></div></td>' +
    '<td class="hcp cv" data-i="' + i + '" data-t="p" tabindex="0"><div class="vbtn"><span class="glyph">' + row.p + '</span></div></td>';
  tb.appendChild(tr);
});

var ov   = document.getElementById('ov');
var mgEl = document.getElementById('mg');
var mbEl = document.getElementById('mb');
var mlEl = document.getElementById('ml');
var mclEl= document.getElementById('mcl');
var mtrEl= document.getElementById('mtr');
var kmEl = document.getElementById('km');
var klEl = document.getElementById('kl');
var kfEl = document.getElementById('kf');

function openModal(i, t) {
  var d = DATA[i], tm = TMAP[t];
  mgEl.textContent = d[tm.vk];
  mgEl.style.color = tm.col;
  mbEl.textContent = tm.label;
  mbEl.className   = 'mo-badge ' + tm.badge;
  mclEl.textContent = d.classe + ' — ' + d.classe_fr;
  mlEl.textContent  = d[tm.vk];
  mtrEl.textContent = d[tm.trk];
  kmEl.textContent  = d[tm.kilk];
  klEl.textContent  = d[tm.latk];
  kfEl.textContent  = d[tm.frk];
  ov.classList.add('open');
  document.getElementById('mx').focus();
}

document.querySelectorAll('.cv').forEach(function(cell) {
  cell.addEventListener('click', function() { openModal(+cell.dataset.i, cell.dataset.t); });
  cell.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openModal(+cell.dataset.i, cell.dataset.t); }
  });
});

document.getElementById('mx').addEventListener('click', function() { ov.classList.remove('open'); });
ov.addEventListener('click', function(e) { if (e.target === ov) ov.classList.remove('open'); });
document.addEventListener('keydown', function(e) { if (e.key === 'Escape') ov.classList.remove('open'); });
</script>
</body>
</html>
